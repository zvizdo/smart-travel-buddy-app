name: CI/CD

on:
  push:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Python tests -------------------------------------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install -e shared
          pip install -r backend/requirements.txt

      - name: Run Python tests
        run: pytest

      # ---- Frontend tests -----------------------------------------------------
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: frontend

      - name: Run frontend tests
        run: pnpm test
        working-directory: frontend

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Keyless auth via Workload Identity Federation — no service account JSON needed.
      # One-time setup: see deploy/README-gcp-auth.md
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy all services
        run: ./deploy/deploy.sh all
        env:
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          REGION: ${{ secrets.REGION }}
          AR_REPO: ${{ secrets.AR_REPO }}
          FRONTEND_SERVICE: ${{ secrets.FRONTEND_SERVICE }}
          BACKEND_SERVICE: ${{ secrets.BACKEND_SERVICE }}
          MCPSERVER_SERVICE: ${{ secrets.MCPSERVER_SERVICE }}
          GCS_CHAT_HISTORY_BUCKET: ${{ secrets.GCS_CHAT_HISTORY_BUCKET }}
          GOOGLE_MAPS_API_KEY_SERVER: ${{ secrets.GOOGLE_MAPS_API_KEY_SERVER }}
          GOOGLE_MAPS_API_KEY_CLIENT: ${{ secrets.GOOGLE_MAPS_API_KEY_CLIENT }}
          API_KEY_HMAC_SECRET: ${{ secrets.API_KEY_HMAC_SECRET }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
